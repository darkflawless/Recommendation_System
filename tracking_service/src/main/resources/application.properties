spring.application.name=tracking_service

spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=${RABBIT_PORT:5672}
spring.rabbitmq.username=${RABBIT_USER:guest}
spring.rabbitmq.password=${RABBIT_PASS:guest}
spring.rabbitmq.template.observation-enabled=true
spring.rabbitmq.listener.simple.observation-enabled=true
spring.rabbitmq.listener.direct.observation-enabled=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

tracking.publish.rabbit.enabled=true
tracking.publish.kafka.enabled=false

tracking.kafka.topic.click=tracking.click.events
tracking.kafka.topic.impression=tracking.impression.events
tracking.kafka.topic.search=tracking.search.events
tracking.kafka.topic.order=tracking.order.events

tracking.rabbit.exchange=tracking.events
tracking.rabbit.routing.click=tracking.click
tracking.rabbit.routing.impression=tracking.impression
tracking.rabbit.routing.search=tracking.search
tracking.rabbit.routing.order=tracking.order

server.port=8095

management.zipkin.tracing.endpoint=http://${ZIPKIN_HOST:localhost}:9411/api/v2/spans
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-no-trace},spanId=%X{spanId:-no-span}]

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){orange} [%clr(%thread){blue}] %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n