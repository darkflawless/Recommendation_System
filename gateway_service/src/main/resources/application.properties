spring.application.name=gateway-service
server.port=8080


eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.config.enabled=false

spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.observability.enabled=true
spring.reactor.context-propagation=auto

spring.cloud.gateway.routes[0].id=tracking-service
spring.cloud.gateway.routes[0].uri=${TRACKING_SERVICE_URI:http://localhost:8095}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/tracking/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.routes[1].id=user-history-service
spring.cloud.gateway.routes[1].uri=${USER_HISTORY_SERVICE_URI:http://localhost:8087}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/history/**,/api/admin/customers,/api/admin/customers/**
spring.cloud.gateway.routes[1].predicates[1]=Method=GET,POST

spring.cloud.gateway.routes[2].id=statistic-service
spring.cloud.gateway.routes[2].uri=${STATISTIC_SERVICE_URI:http://localhost:8085}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/statistics/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true

management.endpoints.web.exposure.include=health,info
management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},traceId=%X{traceId:-no-trace},spanId=%X{spanId:-no-span}]
logging.level.org.springframework.cloud.gateway=DEBUG

spring.output.ansi.enabled=ALWAYS